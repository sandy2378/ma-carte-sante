<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mon Carnet de Santé Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --danger: #e74c3c; --dark: #2c3e50; --safe: #27ae60; --info: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 10px; }
        .card { background: white; padding: 18px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .emergency-card { background: red; color: white; padding: 20px; border-radius: 20px; text-align: center; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-wa { background: #25D366; color: white; }
        .btn-logout { background: rgba(0,0,0,0.2); color: white; width: auto; padding: 5px 10px; position: absolute; top: 10px; right: 10px; border-radius: 5px; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin: 15px 0; }
        .doc-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; margin-top: 8px; color: white; text-decoration: none; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section" class="card" style="text-align:center;">
        <h2 style="color:var(--danger);">💎 Accès Premium</h2>
        <input type="text" id="user_login" placeholder="Nom du patient">
        <input type="password" id="license_key" placeholder="Code d'activation">
        <button onclick="connexion()" style="background:var(--safe); color:white;">🚀 Activer mon Carnet</button>
        
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
            <p style="font-size:12px;">Réglez 10 DT pour activer</p>
            <button onclick="document.getElementById('rib-info').classList.toggle('hidden')" style="background:#f1f1f1; font-size:11px;">👁️ Afficher le RIB</button>
            <div id="rib-info" class="hidden" style="font-size:11px; background:#fafafa; padding:10px; border-radius:10px;">
                RIB : TN59 12 30100 00133 06217243
            </div>
            <button onclick="ouvrirWhatsApp('paiement')" class="btn-wa">💬 Envoyer le reçu</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="emergency-card">
            <button class="btn-logout" onclick="deconnexion()">🚪 Sortir</button>
            <h2>FICHE MÉDICALE 🆘</h2>
            <p id="nomAffiche" style="font-weight:bold; font-size:20px;">Patient</p>
            <div id="qrcode"></div>
            <div id="list-docs-sos"></div>
            <button onclick="partagerFiche()" style="background:#3498db; color:white;">📲 Partager Dossier QR</button>
        </div>

        <div class="card">
            <h3>➕ Nouveau Relevé</h3>
            <div class="grid">
                <input type="text" id="tension" placeholder="Tension">
                <input type="number" id="pouls" placeholder="Pouls">
                <input type="number" id="spo2" placeholder="SpO2 %">
                <input type="number" id="sucre" step="0.01" placeholder="Sucre g/L">
            </div>
            <button onclick="enregistrerDonnees()" style="background:var(--dark); color:white;">💾 Enregistrer</button>
            <button onclick="ouvrirWhatsApp('docteur')" class="btn-wa">💬 Envoyer au Médecin</button>
        </div>

        <div class="card">
            <h3>📈 Courbe Glycémique</h3>
            <canvas id="santeChart" height="180"></canvas>
        </div>

        <div class="card">
            <h3>📁 Ajouter un Document</h3>
            <input type="text" id="titreDoc" placeholder="Titre (ex: Analyse Sang)">
            <input type="text" id="lienDoc" placeholder="Lien du document">
            <button onclick="ajouterAnalyse()" style="background:var(--info); color:white;">🖇️ Lier le document</button>
        </div>

        <div class="card">
            <h3>📒 Historique</h3>
            <table>
                <thead><tr><th>Date</th><th>Tens.</th><th>❤</th><th>Oxy.</th><th>Sucre</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxuLa5Cy51xZ1d8LK-5o0Jd68N8Rz5OMRCvC9U3T80R4Arq-wUQQMD-VgdZzbBZ8c-t/exec";
    let patient = "";
    let monGraphique = null;

    function connexion() {
        const n = document.getElementById('user_login').value.trim();
        const c = document.getElementById('license_key').value.trim();
        if (n && ["CLIENT01", "RIM2026", "AYA2026"].includes(c)) {
            localStorage.setItem('patient_nom', n);
            lancerApp(n);
        } else { alert("Code incorrect"); }
    }

    

function lancerApp(nom) {
    patient = nom;
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
    document.getElementById('nomAffiche').innerText = nom;
    
    // On force un petit délai pour laisser le temps à l'affichage de se stabiliser
    setTimeout(() => {
        const qrDiv = document.getElementById("qrcode");
        if (qrDiv) {
            qrDiv.innerHTML = ""; // On vide la zone
            try {
                // On crée le QR code avec l'adresse actuelle
                new QRCode(qrDiv, {
                    text: window.location.href,
                    width: 150,
                    height: 150,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
                console.log("QR Code généré avec succès");
            } catch (e) {
                console.error("Erreur de génération QR:", e);
                // Si ça échoue, on réessaie une fois après 1 seconde
                setTimeout(() => lancerApp(nom), 1000);
            }
        }
    }, 800);

    chargerHistorique();
}

    
    async function enregistrerDonnees() {
        const d = { nom: patient, tension: document.getElementById('tension').value, pouls: document.getElementById('pouls').value, spo2: document.getElementById('spo2').value, sucre: document.getElementById('sucre').value };
        if(!d.tension || !d.sucre) return alert("Remplissez Tension et Sucre");
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Enregistré !");
        chargerHistorique();
    }

    async function ajouterAnalyse() {
        const t = document.getElementById('titreDoc').value;
        const l = document.getElementById('lienDoc').value;
        const d = { nom: patient, tension: "DOC", spo2: t, sucre: l, pouls: "" };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Document ajouté !");
        chargerHistorique();
    }

    async function chargerHistorique() {
        try {
            const r = await fetch(API_URL);
            const data = await r.json();
            const mesDatas = data.filter(i => i.nom === patient);
            const tbody = document.getElementById('table-body');
            const docList = document.getElementById('list-docs-sos');
            tbody.innerHTML = ""; docList.innerHTML = "";

            mesDatas.reverse().forEach(x => {
                if(x.tension === "DOC") {
                    docList.innerHTML += `<a href="${x.sucre}" target="_blank" class="doc-item"><span>📄 ${x.spo2}</span> <span>👁️</span></a>`;
                } else {
                    let dt = x.date ? new Date(x.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) : "--";
                    tbody.innerHTML += `<tr><td>${dt}</td><td>${x.tension}</td><td>${x.pouls}</td><td>${x.spo2}%</td><td>${x.sucre}</td></tr>`;
                }
            });
            majGraphique(mesDatas);
        } catch(e) { console.log("Erreur chargement"); }
    }

    function majGraphique(donnees) {
        const ctx = document.getElementById('santeChart').getContext('2d');
        const f = donnees.filter(d => d.tension !== "DOC").reverse().slice(-7);
        if(monGraphique) monGraphique.destroy();
        monGraphique = new Chart(ctx, {
            type: 'line',
            data: {
                labels: f.map(d => new Date(d.date).getDate() + "/" + (new Date(d.date).getMonth()+1)),
                datasets: [{ label: 'Glycémie', data: f.map(d => d.sucre), borderColor: 'red', tension: 0.3 }]
            }
        });
    }

    function ouvrirWhatsApp(type) {
        let num = prompt("Numéro :", "21646248269");
        if (!num) return;
        let msg = "";
        if (type === 'paiement') { msg = "Bonjour, j'ai envoyé mon reçu."; }
        else {
            const t = document.getElementById('tension').value || "--";
            const p = document.getElementById('pouls').value || "--";
            const s = document.getElementById('sucre').value || "--";
            const o = document.getElementById('spo2').value || "--";
            msg = `Mesures (${patient}):\n• Tension: ${t}\n• Pouls: ${p}\n• Sucre: ${s}\n• Oxygène: ${o}%`;
        }
        window.location.href = `https://api.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(msg)}`;
    }

    function partagerFiche() {
        let num = prompt("Numéro :", "21646248269");
        if (!num) return;
        const msg = `🆘 URGENCE - Dossier de ${patient} :\n${window.location.href}`;
        window.location.href = `https://api.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(msg)}`;
    }

    function deconnexion() { localStorage.removeItem('patient_nom'); location.reload(); }

    window.onload = () => {
        const s = localStorage.getItem('patient_nom');
        if(s) lancerApp(s);
    };
</script>
</body>
</html>
