<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mon Carnet de Santé Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --danger: #e74c3c; --dark: #2c3e50; 
            --safe: #27ae60; --info: #3498db; 
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 500px; margin: auto; }
        
        /* Cartes */
        .card { background: white; padding: 18px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .emergency-card { 
            background: linear-gradient(135deg, var(--danger), #c0392b); 
            color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px;
        }

        /* Formulaire */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { 
            width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 16px; 
        }
        button { 
            width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px;
        }
        .btn-save { background: var(--dark); color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-blue { background: var(--info); color: white; }
        
        /* Tableaux */
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th { background: #f1f1f1; padding: 10px; border-bottom: 2px solid #ddd; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        
        /* QR Code */
        #qrcode { 
            background: white; padding: 10px; border-radius: 10px; 
            display: inline-block; margin: 15px 0; min-height: 140px;
        }
        .hidden { display: none; }
        
        /* Alertes */
        .badge-danger { background: #ffdada; color: #c0392b; padding: 5px; border-radius: 5px; font-weight: bold; }
        .doc-item { 
            display: flex; justify-content: space-between; background: rgba(255,255,255,0.2); 
            padding: 12px; border-radius: 10px; margin-top: 8px; color: white; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section" class="card" style="text-align:center;">
        <h2 style="color:var(--danger);">💎 Accès Premium Santé</h2>
        <input type="text" id="user_login" placeholder="Nom complet du patient">
        <input type="password" id="license_key" placeholder="Code d'activation">
        <button onclick="connexion()" class="btn-save" style="background:var(--safe);">🚀 Activer mon Carnet</button>
        
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
            <p style="font-size:13px;">Pas de code ? Réglez 10 DT / 10 €</p>
            <button onclick="document.getElementById('rib-info').classList.toggle('hidden')" style="background:#f1f1f1; color:#333; font-size:11px;">👁️ Afficher le RIB</button>
            <div id="rib-info" class="hidden" style="font-size:10px; background:#fafafa; padding:10px; border-radius:10px; margin:10px 0;">
                RIB : TN59 12 30100 00133 06217243
            </div>
            <button onclick="ouvrirWhatsApp('paiement')" class="btn-wa">💬 Envoyer le reçu de paiement</button>
        </div>
    </div>

    <div id="main-content" class="hidden">

<div class="emergency-card" style="background: red; color: white; text-align: center; padding: 20px; border-radius: 20px;">
    <h2>FICHE MÉDICALE 🆘</h2>
    <p id="nomAffiche" style="font-weight: bold; font-size: 20px;">Patient</p>
    
    <div id="qrcode" style="background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 10px auto;"></div>
    
    <br>
    <button onclick="partagerFiche()" style="background: #3498db; color: white; border: none; padding: 10px; border-radius: 10px; margin-top: 10px;">📲 Partager mon Dossier QR</button>
</div>

        
                    
            <div id="docs-sos-container" style="text-align:left; margin-top:20px;">
                <p style="font-size:12px; font-weight:bold; border-bottom:1px solid rgba(255,255,255,0.3); padding-bottom:5px;">📂 DOCUMENTS & ANALYSES :</p>
                <div id="list-docs-sos"></div>
            </div>
        </div>

        <div class="card">
            <h3>➕ Nouveau Relevé</h3>
            <div class="grid">
                <div>
                    <label style="font-size:11px;">Tension (ex: 12/8)</label>
                    <input type="text" id="tension" placeholder="12/8">
                </div>
                <div>
                    <label style="font-size:11px;">Pouls ❤ (bpm)</label>
                    <input type="number" id="pouls" placeholder="75">
                </div>
            </div>
            <div class="grid">
                <div>
                    <label style="font-size:11px;">Oxygène (SpO2 %)</label>
                    <input type="number" id="spo2" placeholder="98">
                </div>
                <div>
                    <label style="font-size:11px;">Sucre (g/L)</label>
                    <input type="number" id="sucre" step="0.01" placeholder="1.05">
                </div>
            </div>
            <button onclick="enregistrerDonnees()" class="btn-save">💾 Enregistrer mes mesures</button>
       
            
       <button onclick="ouvrirWhatsApp('docteur')" style="background:#25D366; color:white; padding:15px; border-radius:10px; width:100%;">
   💬 Envoyer par WhatsApp
</button>

        
        </div>

        <div class="card">
            <h3>📈 Courbe Glycémique</h3>
            <canvas id="santeChart" height="180"></canvas>
        </div>

        <div class="card">
            <h3>📁 Ajouter un Document (Lien)</h3>
            <input type="text" id="titreDoc" placeholder="Titre : ex: Analyse Sang Avril">
            <input type="text" id="lienDoc" placeholder="Collez le lien du document ici">
            <button onclick="ajouterAnalyse()" class="btn-blue">🖇️ Lier le document</button>
        </div>

        <div class="card" style="padding:10px; overflow-x:auto;">
            <h3>📒 Historique des mesures</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th><th>Tens.</th><th>❤ Cœur</th><th>Oxy.</th><th>Sucre</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxuLa5Cy51xZ1d8LK-5o0Jd68N8Rz5OMRCvC9U3T80R4Arq-wUQQMD-VgdZzbBZ8c-t/exec";
    let patient = "";

    function connexion() {
        const n = document.getElementById('user_login').value.trim();
        const c = document.getElementById('license_key').value.trim();
        const codes = ["CLIENT01", "RIM2026", "AYA2026", "PAIEMENT_OK"];
        
        if (n && codes.includes(c)) {
            localStorage.setItem('patient_nom', n);
            lancerApp(n);
        } else { alert("❌ Identifiants invalides."); }
    }

    

function lancerApp(nom) {
    patient = nom;
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
    document.getElementById('nomAffiche').innerText = nom;
    
    // On attend un court instant pour que l'interface soit prête
    setTimeout(() => {
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = ""; // On nettoie
        new QRCode(qrDiv, {
            text: window.location.href, // Le QR code contient le lien de la page
            width: 150,
            height: 150
        });
    }, 500);
}


    
    function initQR() {
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";
        try {
            new QRCode(qrDiv, {
                text: window.location.href,
                width: 140, height: 140
            });
        } catch(e) { setTimeout(initQR, 1000); }
    }



    function afficherLeQR() {
    const zoneQR = document.getElementById("qrcode");
    if (!zoneQR) return; // Sécurité si la zone n'existe pas encore
    
    zoneQR.innerHTML = ""; // Efface l'ancien code pour mettre le nouveau
    
    new QRCode(zoneQR, {
        text: window.location.href, 
        width: 150,
        height: 150,
        colorDark : "#000000",
        colorLight : "#ffffff"
    });
}

    async function enregistrerDonnees() {
        const d = {
            nom: patient,
            tension: document.getElementById('tension').value,
            pouls: document.getElementById('pouls').value,
            spo2: document.getElementById('spo2').value,
            sucre: document.getElementById('sucre').value
        };
        if(!d.tension || !d.sucre) return alert("Tension et Sucre obligatoires !");

        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("✅ Enregistré !");
        location.reload();
    }

    async function ajouterAnalyse() {
        const titre = document.getElementById('titreDoc').value;
        const lien = document.getElementById('lienDoc').value;
        if(!titre || !lien) return alert("Remplissez les deux champs.");

        const d = { nom: patient, tension: "DOC", spo2: titre, sucre: lien, pouls: "" };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("📁 Analyse ajoutée !");
        location.reload();
    }

    async function chargerHistorique() {
        try {
            const r = await fetch(API_URL);
            const data = await r.json();
            const mesDatas = data.filter(i => i.nom === patient);
            
            const tbody = document.getElementById('table-body');
            const docList = document.getElementById('list-docs-sos');
            tbody.innerHTML = ""; docList.innerHTML = "";

            mesDatas.reverse().forEach(x => {
                if(x.tension === "DOC") {
                    docList.innerHTML += `<a href="${x.sucre}" target="_blank" class="doc-item"><span>📄 ${x.spo2}</span> <span>👁️</span></a>`;
                } else {
                    let dt = x.date ? new Date(x.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) : "--";
                    tbody.innerHTML += `<tr>
                        <td>${dt}</td>
                        <td>${x.tension}</td>
                        <td style="color:red; font-weight:bold;">${x.pouls || '-'}</td>
                        <td>${x.spo2 || '-'}%</td>
                        <td style="font-weight:bold;">${x.sucre}</td>
                    </tr>`;
                }
            });
            majGraphique(mesDatas);
        } catch(e) { console.error("Erreur sync"); }
    }

    function majGraphique(donnees) {
        const ctx = document.getElementById('santeChart').getContext('2d');
        const f = donnees.filter(d => d.tension !== "DOC").reverse().slice(-7);
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: f.map(d => new Date(d.date).getDate() + "/" + (new Date(d.date).getMonth()+1)),
                datasets: [{ 
                    label: 'Glycémie (g/L)', 
                    data: f.map(d => d.sucre), 
                    borderColor: '#e74c3c', 
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(231, 76, 60, 0.1)'
                }]
            }
        });
    }




function ouvrirWhatsApp(type) {
    // 1. Demander à l'utilisateur de choisir/saisir le numéro
    let numDestinataire = prompt("Entrez le numéro du destinataire (ex: 21646248269) :", "21646248269");
    
    if (!numDestinataire) return; // Annuler si rien n'est saisi

    let message = "";
    if (type === 'paiement') {
        message = "Bonjour, j'ai envoyé mon reçu de paiement.";
    } else {
        // 2. Récupération précise des données du formulaire (Tension, Pouls, etc.)
        const t = document.getElementById('tension').value || "--";
        const p = document.getElementById('pouls').value || "--";
        const s = document.getElementById('sucre').value || "--";
        const o = document.getElementById('spo2').value || "--";
        const nom = "Aya"; // Nom du patient visible sur vos captures

        message = `Bonjour Docteur, voici mes mesures (${nom}) :\n` +
                  `• Tension: ${t}\n` +
                  `• Pouls: ${p} bpm\n` +
                  `• Sucre: ${s} g/L\n` +
                  `• Oxygène: ${o}%`;
    }

    // 3. Utilisation du lien API universel (plus stable que wa.me)
    const urlwa = "https://api.whatsapp.com/send?phone=" + numDestinataire + "&text=" + encodeURIComponent(message);
    
    // 4. Redirection directe pour éviter le blocage du navigateur
    window.location.href = urlwa;
}


    

    function partagerFiche() {
    // On demande le numéro du destinataire (comme vous l'avez fait pour les mesures)
    let numDestinataire = prompt("Entrez le numéro pour partager le QR Code (ex: 21646248269) :", "21646248269");
    
    if (!numDestinataire) return;

    // Au lieu d'envoyer l'image (qui crée l'erreur 'content://media'), 
    // on envoie le lien direct vers votre carnet de santé.
    // Quand le destinataire clique, il voit votre fiche et votre QR Code.
    const urlDossier = window.location.href;
    const nomPatient = document.getElementById('nomAffiche').innerText || "Aya";
    
    const message = `🆘 *URGENCE - FICHE MÉDICALE*\n\nVoici l'accès au dossier de santé de *${nomPatient}*.\nCliquez sur le lien pour voir les mesures et le QR Code :\n${urlDossier}`;

    const urlWA = "https://api.whatsapp.com/send?phone=" + numDestinataire + "&text=" + encodeURIComponent(message);
    
    // Redirection directe vers WhatsApp
    window.location.href = urlWA;
}

    function deconnexion() { localStorage.removeItem('patient_nom'); location.reload(); }

    window.onload = () => {
        const s = localStorage.getItem('patient_nom');
        if(s) lancerApp(s);
    };
</script>
</body>
</html>
