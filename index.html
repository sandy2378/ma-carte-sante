<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mon Carnet de Santé Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --danger: #e74c3c; --dark: #2c3e50; --safe: #27ae60; --info: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; padding: 10px; color: var(--dark); }
        .card { background: white; padding: 18px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .emergency-card { background: red; color: white; padding: 20px; border-radius: 20px; text-align: center; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-logout { background: rgba(0,0,0,0.2); color: white; width: auto; padding: 5px 10px; position: absolute; top: 10px; right: 10px; border-radius: 5px; font-size: 12px; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin: 15px 0; min-height: 150px; min-width: 150px; }
        .doc-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; margin-top: 8px; color: white; text-decoration: none; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section" class="card" style="text-align:center;">
        <h2 style="color:var(--danger);">💎 Accès Premium Santé</h2>
        <input type="text" id="user_login" placeholder="Votre Nom (ex: Aya)">
<input type="password" id="license_key" placeholder="Code d'activation">
        <button onclick="connexion()" class="btn-green">🚀 Activer mon Carnet</button>


        
        
        
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
            <p style="font-size:12px;">Activation : 10 DT / 10 €</p>
            <button onclick="document.getElementById('rib-info').classList.toggle('hidden')" style="background:#f1f1f1; font-size:11px;">👁️ Voir RIB</button>
            <div id="rib-info" class="hidden" style="font-size:11px; background:#fafafa; padding:10px; border-radius:10px;">
                RIB : TN59 12 30100 00133 06217243
            </div>
            <button onclick="ouvrirWhatsApp('paiement')" class="btn-wa">💬 Envoyer reçu</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="emergency-card">
            <button class="btn-logout" onclick="deconnexion()">🚪 Sortir</button>
            <h2>FICHE MÉDICALE 🆘</h2>
            <p id="nomAffiche" style="font-weight:bold; font-size:22px;">Patient</p>
            
            <div id="qrcode"></div>
            
            <div id="list-docs-sos"></div>
            <button onclick="partagerFiche()" style="background:#3498db; color:white; margin-top:10px;">📲 Partager Dossier QR</button>

            
        </div>

        <div class="card">
            <h3>➕ Nouveau Relevé</h3>
            <div class="grid">
                <input type="text" id="tension" placeholder="Tension">
                <input type="number" id="pouls" placeholder="Pouls ❤">
                <input type="number" id="spo2" placeholder="Oxygène %">
                <input type="number" id="sucre" step="0.01" placeholder="Sucre g/L">
            </div>
            <button onclick="enregistrerDonnees()" style="background:var(--dark); color:white;">💾 Enregistrer</button>
            <button onclick="ouvrirWhatsApp('docteur')" class="btn-wa">💬 Envoyer au Médecin</button>
        </div>

        <div class="card">
            <h3>📈 Courbe Glycémique</h3>
            <canvas id="santeChart" height="180"></canvas>
        </div>

        <div class="card">
            <h3>📁 Documents / Analyses</h3>
            <input type="text" id="titreDoc" placeholder="Titre du document">
            <input type="text" id="lienDoc" placeholder="Lien (URL)">
            <button onclick="ajouterAnalyse()" style="background:var(--info); color:white;">🖇️ Ajouter le document</button>
        </div>

        <div class="card" style="overflow-x:auto;">
            <h3>📒 Historique</h3>
            <table>
                <thead><tr><th>Date</th><th>Tens.</th><th>❤</th><th>Oxy.</th><th>Sucre</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxuLa5Cy51xZ1d8LK-5o0Jd68N8Rz5OMRCvC9U3T80R4Arq-wUQQMD-VgdZzbBZ8c-t/exec";
    let patient = "";
    let monGraphique = null;

    function connexion() {
        const n = document.getElementById('user_login').value.trim();
        const c = document.getElementById('license_key').value.trim();
        if (n && ["CLIENT01", "RIM2026", "AYA2026"].includes(c)) {
            localStorage.setItem('patient_nom', n);
            lancerApp(n);
        } else { alert("❌ Code invalide"); }
    }

    function lancerApp(pseudo) {
        patient = pseudo;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('nomAffiche').innerText = "Patient : " + (pseudo.charAt(0).toUpperCase() + pseudo.slice(1));
        
        // On génère le QR Code immédiatement
        tenterGenerationQR();
        chargerHistorique();
    }

    function tenterGenerationQR() {
        const qrDiv = document.getElementById("qrcode");
        if (!qrDiv) return;
        qrDiv.innerHTML = ""; 
        
        // Utilisation simple de la bibliothèque
        new QRCode(qrDiv, {
            text: window.location.href,
            width: 150,
            height: 150,
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // --- LA FONCTION DE PARTAGE QUI MARCHE (IMAGE + LIEN) ---
    async function partagerFiche() {
        // On récupère le canvas (le dessin du QR)
        const canvas = document.querySelector('#qrcode canvas');
        if (!canvas) {
            alert("QR Code en cours de création... réessayez.");
            return;
        }

        try {
            // Conversion en image pour le téléphone
            const dataUrl = canvas.toDataURL("image/png");
            const blob = await (await fetch(dataUrl)).blob();
            const file = new File([blob], 'qr_sante.png', { type: 'image/png' });

            // Menu de partage natif (iPhone/Android)
            if (navigator.share) {
                await navigator.share({
                    title: 'Urgence Santé',
                    text: `Dossier Médical de ${patient} : ${window.location.href}`,
                    files: [file]
                });
            } else {
                alert("Le partage d'image n'est pas supporté. Faites une capture d'écran.");
            }
        } catch (err) {
            // Secours : si l'image bloque, on partage au moins le lien
            navigator.share({
                title: 'Urgence Santé',
                text: `Lien du dossier de ${patient} : ${window.location.href}`
            }).catch(() => alert("Erreur de partage."));
        }
    }

    async function enregistrerDonnees() {
        const d = { nom: patient, tension: document.getElementById('tension').value, pouls: document.getElementById('pouls').value, spo2: document.getElementById('spo2').value, sucre: document.getElementById('sucre').value };
        if(!d.tension || !d.sucre) return alert("Tension et Sucre requis");
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("✅ Données enregistrées");
        chargerHistorique();
    }

    async function ajouterAnalyse() {
        const t = document.getElementById('titreDoc').value;
        const l = document.getElementById('lienDoc').value;
        if(!t || !l) return alert("Champs vides");
        const d = { nom: patient, tension: "DOC", spo2: t, sucre: l, pouls: "" };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("📁 Document lié !");
        chargerHistorique();
    }

    async function chargerHistorique() {
        try {
            const r = await fetch(API_URL);
            const data = await r.json();
            const mesDatas = data.filter(i => i.nom === patient);
            const tbody = document.getElementById('table-body');
            const docList = document.getElementById('list-docs-sos');
            if(!tbody) return;
            tbody.innerHTML = ""; 
            if(docList) docList.innerHTML = "";

            mesDatas.reverse().forEach(x => {
                if(x.tension === "DOC") {
                    if(docList) docList.innerHTML += `<a href="${x.sucre}" target="_blank" class="doc-item"><span>📄 ${x.spo2}</span> <span>👁️</span></a>`;
                } else {
                    let dt = x.date ? new Date(x.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) : "--";
                    tbody.innerHTML += `<tr><td>${dt}</td><td>${x.tension}</td><td>${x.pouls}</td><td>${x.spo2}%</td><td>${x.sucre}</td></tr>`;
                }
            });
            majGraphique(mesDatas);
        } catch(e) { console.log("Erreur Sync"); }
    }

    function majGraphique(donnees) {
        const chartEl = document.getElementById('santeChart');
        if(!chartEl) return;
        const ctx = chartEl.getContext('2d');
        const f = donnees.filter(d => d.tension !== "DOC").reverse().slice(-7);
        if(monGraphique) monGraphique.destroy();
        monGraphique = new Chart(ctx, {
            type: 'line',
            data: {
                labels: f.map(d => new Date(d.date).getDate() + "/" + (new Date(d.date).getMonth()+1)),
                datasets: [{ label: 'Glycémie (g/L)', data: f.map(d => d.sucre), borderColor: '#e74c3c', tension: 0.3, fill: true, backgroundColor: 'rgba(231, 76, 60, 0.1)' }]
            }
        });
    }

    function ouvrirWhatsApp(type) {
        let num = prompt("Numéro WhatsApp (ex: 21646248269) :", "21646248269");
        if (!num) return;
        let msg = "";
        if (type === 'paiement') { msg = "Bonjour, j'ai envoyé mon reçu de paiement."; }
        else {
            const t = document.getElementById('tension').value || "--";
            const p = document.getElementById('pouls').value || "--";
            const s = document.getElementById('sucre').value || "--";
            const o = document.getElementById('spo2').value || "--";
            msg = `Bonjour Docteur, voici mes mesures (${patient}) :\n• Tension: ${t}\n• Pouls: ${p} bpm\n• Sucre: ${s} g/L\n• Oxygène: ${o}%`;
        }
        window.location.href = `https://api.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(msg)}`;
    }

    function deconnexion() { localStorage.removeItem('patient_nom'); location.reload(); }

    window.onload = () => {
        const s = localStorage.getItem('patient_nom');
        if(s) lancerApp(s);
    };
</script>


</body>
</html>
